</head>

<body>

<div class="container">

```
<!-- LOGIN SECTION -->

<div id="loginSection">

    <h2>User Login</h2>

    <form id="loginForm">

        <label for="loginEmail">
            Email or Username
        </label>

        <input
            type="text"
            id="loginEmail"
            name="email"
            placeholder="Enter email or username"
            required
        >


        <label for="loginPassword">
            Password
        </label>

        <input
            type="password"
            id="loginPassword"
            name="password"
            placeholder="Enter your password"
            required
        >

        <button type="submit">
            Login
        </button>

    </form>


    <button
        class="switch-btn"
        onclick="showRegister()"
    >
        Don't have an account? Create Account
    </button>

</div>


<!-- REGISTER SECTION -->

<div
    id="registerSection"
    class="hidden"
>

    <h2>Create Account</h2>

    <form id="registerForm">

        <label for="fullname">
            Full Name
        </label>

        <input
            type="text"
            id="fullname"
            name="fullname"
            placeholder="Enter your full name"
            required
        >


        <label for="username">
            Username
        </label>

        <input
            type="text"
            id="username"
            name="username"
            placeholder="Enter your username"
            required
        >


        <label for="registerEmail">
            Email
        </label>

        <input
            type="email"
            id="registerEmail"
            name="email"
            placeholder="Enter your email"
            required
        >


        <label for="registerPassword">
            Password
        </label>

        <input
            type="password"
            id="registerPassword"
            name="password"
            placeholder="Enter your password"
            required
        >


        <label for="avatar">
            Avatar Image
        </label>

        <input
            type="file"
            id="avatar"
            name="avatar"
            accept="image/*"
            required
        >

            Cover Image (Optional)

            type="file"
            id="coverImage"
            name="coverImage"
            accept="image/*"
        >

            Create Account
        </button>

        class="switch-btn"

</div>


<!-- MESSAGE -->

<p id="message"></p>


<!-- LOGGED-IN USER INFORMATION -->

<div
    id="userInfo"

>

    <h2>User Information</h2>

    <p>
        <strong>Full Name:</strong>
        <span id="userFullname"></span>
    </p>

        <strong>Username:</strong>

```

</div>

<script>


    const API_URL =
        "http://localhost:8000/api/v1/users";


    // LOGIN

    document
        .getElementById("loginForm")
        .addEventListener("submit", async function (event) {

            event.preventDefault();


            const email =
                document
                .getElementById("loginEmail")
                .value;


            const password =
                document
                .getElementById("loginPassword")
                .value;


            try {

                const response = await fetch(
                    `${API_URL}/login`,
                    {
                        method: "POST",

                        headers: {
                            "Content-Type": "application/json"
                        },

                        credentials: "include",

                        body: JSON.stringify({
                            email: email,
                            password: password
                        })
                    }
                );


                const data = await response.json();


                if (!response.ok) {

                    throw new Error(
                        data.message || "Login failed"
                    );

                }


                showMessage(
                    "Login successful!",
                    "green"
                );


                // Get logged-in user information

                getCurrentUser();

            }

            catch (error) {

                showMessage(
                    error.message,
                    "red"
                );

            }

        });


    // REGISTER

    document
        .getElementById("registerForm")
        .addEventListener("submit", async function (event) {

            event.preventDefault();


            const formData =
                new FormData(this);


            try {

                const response = await fetch(
                    `${API_URL}/register`,
                    {
                        method: "POST",

                        credentials: "include",

                        body: formData
                    }
                );


                const data = await response.json();


                if (!response.ok) {

                    throw new Error(
                        data.message || "Registration failed"
                    );

                }


                showMessage(
                    "Account created successfully!",
                    "green"
                );


                // Get user information

                getCurrentUser();

            }

            catch (error) {

                showMessage(
                    error.message,
                    "red"
                );

            }

        });


    // GET CURRENT LOGGED-IN USER

    async function getCurrentUser() {

        try {

            const response = await fetch(
                `${API_URL}/current-user`,
                {
                    method: "GET",

                    credentials: "include"
                }
            );


            const data = await response.json();


            if (!response.ok) {

                throw new Error(
                    data.message || "User not logged in"
                );

            }


            const user =
                data.data;


            document
                .getElementById("userFullname")
                .textContent =
                user.fullname;


            document
                .getElementById("userUsername")
                .textContent =
                user.username;


            document
                .getElementById("userEmail")
                .textContent =
                user.email;


            document
                .getElementById("loginSection")
                .classList
                .add("hidden");


            document
                .getElementById("registerSection")
                .classList
                .add("hidden");


            document
                .getElementById("userInfo")
                .classList
                .remove("hidden");

        }

        catch (error) {

            console.log(
                "No logged-in user"
            );

        }

    }


    // LOGOUT

    async function logoutUser() {

        try {

            const response = await fetch(
                `${API_URL}/logout`,
                {
                    method: "POST",

                    credentials: "include"
                }
            );


            const data =
                await response.json();


            if (!response.ok) {

                throw new Error(
                    data.message || "Logout failed"
                );

            }


            document
                .getElementById("userInfo")
                .classList
                .add("hidden");


            document
                .getElementById("loginSection")
                .classList
                .remove("hidden");


            showMessage(
                "Logout successful!",
                "green"
            );

        }

        catch (error) {

            showMessage(
                error.message,
                "red"
            );

        }

    }


    // SHOW REGISTER FORM

    function showRegister() {

        document
            .getElementById("loginSection")
            .classList
            .add("hidden");


        document
            .getElementById("registerSection")
            .classList
            .remove("hidden");

    }


    // SHOW LOGIN FORM

    function showLogin() {

        document
            .getElementById("registerSection")
            .classList
            .add("hidden");


        document
            .getElementById("loginSection")
            .classList
            .remove("hidden");

    }


    // SHOW MESSAGE

    function showMessage(message, color) {

        const messageElement =
            document
            .getElementById("message");


        messageElement.textContent =
            message;


        messageElement.style.color =
            color;

    }


    // CHECK USER WHEN PAGE LOADS

    getCurrentUser();


</script>

</body>

</html>
