<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Login</title>

```
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, Helvetica, sans-serif;
    }

    body {
        background: #f4f4f4;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }

    .container {
        width: 400px;
        background: #fff;
        padding: 25px;
        border-radius: 10px;
        box-shadow: 0 0 10px rgba(0, 0, 0, .2);
    }

    h2 {
        text-align: center;
        margin-bottom: 20px;
    }

    label {
        display: block;
        margin-top: 15px;
        font-weight: bold;
    }

    input {
        width: 100%;
        padding: 10px;
        margin-top: 5px;
        border: 1px solid #ccc;
        border-radius: 5px;
    }

    button {
        width: 100%;
        padding: 12px;
        margin-top: 20px;
        border: none;
        background: #007BFF;
        color: white;
        font-size: 16px;
        border-radius: 5px;
        cursor: pointer;
    }

    button:hover {
        background: #0056b3;
    }

    .logout-btn {
        background: #dc3545;
    }

    .logout-btn:hover {
        background: #a71d2a;
    }
</style>
```

</head>

<body>

<div class="container">

```
<h2>User Login</h2>

<form
    action="http://localhost:8000/api/v1/users/login"
    method="POST"
>

    <!-- Email or Username -->
    <label for="email">Email or Username</label>

    <input
        type="text"
        id="email"
        name="email"
        placeholder="Enter email or username"
        required
    >

    <!-- Password -->
    <label for="password">Password</label>

    <input
        type="password"
        id="password"
        name="password"
        placeholder="Enter your password"
        required
    >

    <!-- Login Button -->
    <button type="submit">
        Login
    </button>

</form>

<!-- Logout Button -->
<form
    action="http://localhost:8000/api/v1/users/logout"
    method="POST"
>

    <button
        type="submit"
        class="logout-btn"
    >
        Logout
    </button>

</form>
```

</div>

</body>
</html>
